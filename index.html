<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Minimaa Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#050505" />

  <!-- Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="ambient-light"></div>

  <main class="dashboard">

    <!-- SEARCH -->
    <section class="search-section">

      <form id="searchForm" class="search-bar">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search Google..."
          autocomplete="off"
        />

      </form>

    </section>

    <!-- TOP -->
    <section class="top-section">

      <!-- CLOCK -->
      <div class="clock-wrapper widget">

        <div id="clock">19:42</div>

        <div class="greeting-wrap">

          <h2 id="greeting">
            Good Evening
          </h2>

          <input
            type="text"
            id="username"
            placeholder="Enter your name"
          />

        </div>

      </div>

      <!-- RIGHT -->
      <div class="right-widgets">

        <div class="date-card widget">
          <p id="date">Thursday, August 30</p>
        </div>

        <div class="weather-card widget">

          <div class="weather-top">

            <i class="fa-solid fa-cloud"></i>

            <span id="temperature">
              16°C
            </span>

          </div>

          <p id="weather-description">
            Few clouds
          </p>

        </div>

      </div>

    </section>

    <!-- SHORTCUTS -->
    <section class="shortcuts-section">

      <div class="section-header">

        <h3>Shortcuts</h3>

        <button id="editShortcutsBtn">
          <i class="fa-solid fa-plus"></i>
        </button>

      </div>

      <div
        class="shortcuts-grid"
        id="shortcutsGrid"
      ></div>

    </section>

    <!-- MUSIC -->
    <section class="music-section widget">

      <div class="music-header">

        <div>

          <p class="label">
            Focus Music
          </p>

          <h3>
            Ambient / Lofi
          </h3>

        </div>

        <i class="fa-solid fa-headphones"></i>

      </div>

      <iframe
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8NTLI2TtZa6?utm_source=generator"
        loading="lazy"
        allowfullscreen=""
      ></iframe>

    </section>

  </main>

  <!-- Theme Toggle -->
  <button id="themeToggle" class="theme-toggle">

    <i class="fa-solid fa-moon"></i>

  </button>

  <!-- Sortable -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <script src="script.js"></script>

</body>
</html>
