<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Minimaa Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#050505" />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background Glow -->
  <div class="bg-glow"></div>

  <!-- App -->
  <main class="dashboard">

    <!-- Top Bar -->
    <section class="top-section">

      <div class="clock-wrapper glass">
        <div id="clock">00:00</div>

        <div class="greeting-wrap">
          <h2 id="greeting">Good Evening</h2>

          <div class="username-edit">
            <input
              type="text"
              id="username"
              placeholder="Enter your name"
            />
          </div>
        </div>
      </div>

      <div class="right-widgets">

        <div class="date-card glass">
          <p id="date"></p>
        </div>

        <div class="weather-card glass">
          <div class="weather-top">
            <i class="fa-solid fa-cloud"></i>
            <span id="temperature">--°</span>
          </div>

          <p id="weather-description">Loading weather...</p>
        </div>

      </div>

    </section>

    <!-- Search -->
    <section class="search-section">
      <form id="searchForm" class="search-bar glass">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search Google..."
          autocomplete="off"
        />
      </form>
    </section>

    <!-- Shortcuts -->
    <section class="shortcuts-section">

      <div class="section-title">
        <h3>Shortcuts</h3>

        <button id="editShortcutsBtn">
          <i class="fa-solid fa-pen"></i>
        </button>
      </div>

      <div class="shortcuts-grid" id="shortcutsGrid"></div>

    </section>

    <!-- Music -->
    <section class="music-section glass">

      <div class="music-top">
        <div>
          <p class="music-label">Focus Music</p>
          <h3>Lofi / Ambient</h3>
        </div>

        <i class="fa-solid fa-headphones"></i>
      </div>

      <iframe
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8NTLI2TtZa6?utm_source=generator"
        allowfullscreen=""
        loading="lazy"
      ></iframe>

    </section>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle">
      <i class="fa-solid fa-moon"></i>
    </button>

  </main>

  <script src="script.js"></script>
</body>
</html>
