<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Minimaa</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <meta
    name="theme-color"
    content="#050505"
  />

  <!-- Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Sortable -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="ambient"></div>

  <!-- SETTINGS -->
  <button id="settingsBtn" class="settings-btn">

    <i class="fa-solid fa-sliders"></i>

  </button>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel" class="settings-panel hidden">

    <div class="setting-item">

      <span>Bookmarks</span>

      <input
        type="checkbox"
        id="toggleBookmarks"
        checked
      />

    </div>

    <div class="setting-item">

      <span>Weather</span>

      <input
        type="checkbox"
        id="toggleWeather"
        checked
      />

    </div>

    <div class="setting-item">

      <span>Clock</span>

      <input
        type="checkbox"
        id="toggleClock"
        checked
      />

    </div>

    <div class="setting-item">

      <span>Music</span>

      <input
        type="checkbox"
        id="toggleMusic"
        checked
      />

    </div>

  </div>

  <main class="container">

    <!-- SEARCH -->
    <section class="search-section">

      <form id="searchForm" class="search-bar">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search..."
          autocomplete="off"
        />

      </form>

    </section>

    <!-- HERO -->
    <section class="hero">

      <div
        class="clock-block"
        id="clockBlock"
      >

        <h1 id="clock">
          20:41
        </h1>

        <p id="greeting">
          Good Evening
        </p>

      </div>

      <div
        class="weather-inline"
        id="weatherBlock"
      >

        <span id="temperature">
          16°C
        </span>

        <span class="dot"></span>

        <span id="date">
          Thursday, August 30
        </span>

      </div>

    </section>

    <!-- BOOKMARKS -->
    <section
      class="bookmarks-section"
      id="bookmarksSection"
    >

      <div
        class="bookmarks-row"
        id="bookmarksRow"
      ></div>

    </section>

    <!-- MUSIC -->
    <section
      class="music-section"
      id="musicSection"
    >

      <iframe
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8NTLI2TtZa6?utm_source=generator"
        loading="lazy"
        allowfullscreen=""
      ></iframe>

    </section>

  </main>

  <button
    id="themeToggle"
    class="theme-toggle"
  >

    <i class="fa-solid fa-moon"></i>

  </button>

  <script src="script.js"></script>

</body>
</html>
